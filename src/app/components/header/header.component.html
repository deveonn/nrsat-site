<header class="header">
  <div class="header__inner">
    <a href="#inicio" class="header__logo" aria-label="NRSAT — Início">
      <span class="header__logo-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round">
          <path d="M12 3 L19 6 V11 C19 15.5 16 18.6 12 20 C8 18.6 5 15.5 5 11 V6 Z"/>
          <circle cx="12" cy="11" r="2.5" fill="#FFFFFF" stroke="none"/>
        </svg>
      </span>
      <span class="header__logo-text">
        <span class="header__logo-name">NRSAT</span>
        <span class="header__logo-sub">Tecnologia e Monitoramento</span>
      </span>
    </a>

    @if (isDesktop) {
      <nav class="header__nav" aria-label="Navegação principal">
        <a href="#inicio" class="nav-link">Início</a>
        <a href="#servicos" class="nav-link">Serviços</a>
        <a href="#como-funciona" class="nav-link">Como Funciona</a>
        <a href="#empresa" class="nav-link">A Empresa</a>
        <a href="#contato" class="nav-link">Contato</a>
      </nav>
      <div class="header__actions">
        <a [href]="cfg.areaClienteUrl" class="btn-outline">Área do Cliente</a>
        <a [href]="cfg.waOrcamento" target="_blank" rel="noopener" class="btn-whatsapp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#FFFFFF" aria-hidden="true">
            <path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2Zm5 13.9c-.2.6-1.2 1.2-1.7 1.2-.4.1-1 .1-1.6-.1a13 13 0 0 1-5.9-5.2c-.7-1.2-1.1-2.5-.7-3.3.2-.5.8-1.3 1.3-1.3h.6c.2 0 .4 0 .6.5l.8 2c.1.2.1.4 0 .6l-.5.8c-.1.2-.2.4 0 .7.5.9 1.9 2.4 3.4 3 .3.2.5.1.7-.1l.7-.9c.2-.3.4-.3.7-.2l2 1c.3.1.5.2.5.4 0 .1 0 .5-.1.9Z"/>
          </svg>
          Orçamento no WhatsApp
        </a>
      </div>
    } @else {
      <div class="header__mobile-actions">
        <a [href]="cfg.waOrcamento" target="_blank" rel="noopener" class="btn-whatsapp btn-whatsapp--compact" aria-label="Orçamento no WhatsApp">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="#FFFFFF" aria-hidden="true">
            <path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2Zm5 13.9c-.2.6-1.2 1.2-1.7 1.2-.4.1-1 .1-1.6-.1a13 13 0 0 1-5.9-5.2c-.7-1.2-1.1-2.5-.7-3.3.2-.5.8-1.3 1.3-1.3h.6c.2 0 .4 0 .6.5l.8 2c.1.2.1.4 0 .6l-.5.8c-.1.2-.2.4 0 .7.5.9 1.9 2.4 3.4 3 .3.2.5.1.7-.1l.7-.9c.2-.3.4-.3.7-.2l2 1c.3.1.5.2.5.4 0 .1 0 .5-.1.9Z"/>
          </svg>
          Orçamento
        </a>
        <button
          class="btn-hamburger"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-label="Abrir menu"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#871619" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="7" x2="20" y2="7"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="17" x2="20" y2="17"/>
          </svg>
        </button>
      </div>
    }
  </div>

  @if (!isDesktop && menuOpen()) {
    <nav class="mobile-menu" aria-label="Menu">
      <a href="#inicio" class="mobile-menu__link" (click)="closeMenu()">Início</a>
      <a href="#servicos" class="mobile-menu__link" (click)="closeMenu()">Serviços</a>
      <a href="#como-funciona" class="mobile-menu__link" (click)="closeMenu()">Como Funciona</a>
      <a href="#empresa" class="mobile-menu__link" (click)="closeMenu()">A Empresa</a>
      <a href="#contato" class="mobile-menu__link" (click)="closeMenu()">Contato</a>
      <a [href]="cfg.areaClienteUrl" class="mobile-menu__cliente">Área do Cliente</a>
    </nav>
  }
</header>
